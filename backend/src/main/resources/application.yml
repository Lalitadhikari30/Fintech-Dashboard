server:
  port: 8080

spring:
  application:
    name: financial-dashboard

  # ── MySQL Database ──
  datasource:
    url: jdbc:mysql://localhost:3306/fintech_dashboard?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: Lalit9968@
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── JPA / Hibernate ──
  jpa:
    hibernate:
      ddl-auto: update     # update schema instead of drop-create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # ── Jackson ──
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ── JWT Configuration ──
app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration-ms: 86400000   # 24 hours

# ── Swagger / OpenAPI ──
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ── Logging ──
logging:
  level:
    com.fintech.dashboard: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
